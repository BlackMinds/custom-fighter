name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 允许 Actions 读取仓库、写入 Pages、申请 OIDC token
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新提交会取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        env:
          # 项目站点部署在 /<仓库名>/ 子路径下
          NUXT_APP_BASE_URL: /custom-fighter/
        run: npm run generate

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
